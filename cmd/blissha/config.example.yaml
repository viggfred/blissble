# blissha configuration — bridges Bliss Smart Blinds to Home Assistant via MQTT.

mqtt:
  broker: tcp://192.168.1.10:1883   # tcp://host:1883 or tls://host:8883
  username: mqtt_user
  password: mqtt_pass
  # client_id: blissble
  # discovery_prefix: homeassistant  # must match HA's MQTT discovery prefix
  # base_topic: blissble             # prefix for state/command topics

# How often to refresh each blind's status.
poll_interval: 30s

# Battery-saving mode: when set (> 0), blissha keeps the BLE link DISCONNECTED
# while idle and only connects to run a command or a refresh, dropping it again
# after this idle window. Leave unset (0) for a persistent connection. In
# on-demand mode, raise poll_interval (e.g. 1h) so refreshes stay infrequent.
# idle_disconnect: 30s

# Zero or more blinds. Each becomes an HA Cover (+ battery sensor and
# fast/slow up/down buttons), grouped as one HA device.
blinds:
  - name: Living Room
    mac: AA:BB:CC:DD:EE:01
    device_class: shade        # optional: shade | blind | curtain | awning | ...
    # password: xxxxxx         # optional; defaults to the built-in key
    # invert: false            # set true if open/closed are swapped in HA

  - name: Bedroom
    mac: AA:BB:CC:DD:EE:FF
